spring:
  application:
    name: integracao-lincros-tms

server:
  port: 8080

lincros:
  base-url: ${LINCROS_BASE_URL:http://localhost:9090}
  api-key: ${LINCROS_API_KEY:}

lincros-tracking:
  base-url: ${LINCROS_TRACKING_BASE_URL:http://localhost:9091}
  api-key: ${LINCROS_TRACKING_API_KEY:}
  api-key-header-name: ${LINCROS_TRACKING_API_KEY_HEADER_NAME:apiKey}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
